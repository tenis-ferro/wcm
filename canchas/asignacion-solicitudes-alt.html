<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Club de Tenis Ferroviario</title>
  
  <!-- Vendor CSS Files -->
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      font-family: "Open Sans", sans-serif;
      color: #444;
      padding: 20px;
    }
    .day-btn {
      border: 1px solid #ced4da;
      background-color: #fff;
      color: #495057;
      padding: 10px 20px;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    .day-btn.active {
      background-color: #ffc451;
      border-color: #ffc451;
      color: #151515;
      box-shadow: 0 4px 10px rgba(255, 196, 81, 0.3);
    }
    .day-btn:hover:not(.active) {
      background-color: #f1f3f5;
    }
    .grid-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
      min-height: 350px;
    }
    .timetable-table {
      table-layout: fixed;
      width: 100%;
    }
    .timetable-table th, .timetable-table td {
      text-align: center;
      vertical-align: middle;
      border: 1px solid #dee2e6;
      padding: 8px;
    }
    .timetable-table th {
      background-color: #151515;
      color: #fff;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .time-col {
      background-color: #e9ecef;
      font-weight: 700;
      font-size: 0.85rem;
      width: 110px;
    }
    .slot {
      border-radius: 6px;
      padding: 8px 4px;
      font-size: 0.8rem;
      min-height: 85px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .slot-disponible {
      background-color: rgba(40, 167, 69, 0.05);
      border: 1px dashed rgba(40, 167, 69, 0.3);
      color: #28a745;
    }
    .slot-disponible:hover {
      background-color: rgba(40, 167, 69, 0.12);
      transform: scale(1.02);
    }
    .slot-reservado {
      background-color: rgba(108, 117, 125, 0.08);
      border: 1px solid rgba(108, 117, 125, 0.2);
      color: #495057;
    }
    .slot-clase {
      background-color: rgba(0, 123, 255, 0.07);
      border: 1px solid rgba(0, 123, 255, 0.2);
      color: #0056b3;
    }
    .slot-desafio {
      background-color: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      color: #856404;
    }
    .slot-nodisponible {
      background-color: rgba(220, 53, 69, 0.05);
      border: 1px solid rgba(220, 53, 69, 0.15);
      color: #dc3545;
      cursor: not-allowed;
    }
    .slot-name {
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      max-width: 98%;
    }
    .slot-type {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      margin-right: 20px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
    }
    .occupancy-badge {
      background-color: #151515;
      color: #ffc451;
      font-weight: 600;
      border-radius: 30px;
      padding: 5px 15px;
      font-size: 0.85rem;
    }
    .spinner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      border-radius: 10px;
      transition: opacity 0.3s ease;
    }
    
    /* Responsive styling for small screens */
    @media (max-width: 991.98px) {
      .timetable-table {
        display: block;
        overflow-x: auto;
      }
      .slot {
        min-width: 110px;
      }
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <!-- Header de Sección -->
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4">
      <div>
        <h4 class="fw-bold mb-1"><i class="bi bi-calendar3 text-warning me-2"></i>Reservas (Tiempo Real)</h4>
        <p class="text-muted small mb-0">Visualización de asignación horaria oficial desde la Google Sheet de asignaciones.</p>
      </div>
      <div class="d-flex align-items-center mt-2 mt-sm-0">
        <span class="me-2 text-muted small">Ocupación del día:</span>
        <span class="occupancy-badge" id="occupancy-rate">0%</span>
      </div>
    </div>

    <!-- Navegación de Días -->
    <div class="d-flex flex-wrap gap-2 mb-4 justify-content-center justify-content-md-start">
      <button class="day-btn active" data-day="Martes" data-gid="415403082">Martes</button>
      <button class="day-btn" data-day="Miércoles" data-gid="1570689087">Miércoles</button>
      <button class="day-btn" data-day="Jueves" data-gid="865920848">Jueves</button>
      <button class="day-btn" data-day="Viernes" data-gid="814243974">Viernes</button>
      <button class="day-btn" data-day="Sábado" data-gid="162767966">Sábado</button>
      <button class="day-btn" data-day="Domingo" data-gid="249849703">Domingo</button>
    </div>

    <!-- Grilla del Timetable -->
    <div class="grid-card">
      <!-- Loading Overlay -->
      <div class="spinner-overlay" id="loading-spinner">
        <div class="text-center">
          <div class="spinner-border text-warning" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
          <p class="mt-2 mb-0 fw-bold text-muted">Obteniendo cronograma desde Google Sheets...</p>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered timetable-table mb-0">
          <thead>
            <tr>
              <th scope="col" class="time-col">Bloque</th>
              <th scope="col">Cancha 1</th>
              <th scope="col">Cancha 2</th>
              <th scope="col">Cancha 3</th>
              <th scope="col">Cancha 4</th>
              <th scope="col">Cancha 5</th>
              <th scope="col">Cancha 6</th>
            </tr>
          </thead>
          <tbody id="timetable-body">
            <!-- Cargado dinámicamente por JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Notas y Comentarios Generales -->
    <div class="card p-3 mt-3 d-none" id="notes-card" style="border: none; border-radius: 10px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);">
      <h6 class="fw-bold mb-3 small text-uppercase letter-spacing-1 text-warning"><i class="bi bi-info-circle-fill me-1"></i>Notas y Comentarios Generales</h6>
      <div id="general-notes-content" class="small text-muted">
        <!-- Cargado dinámicamente -->
      </div>
    </div>
  </div>

  <!-- Modal de Detalle de Reserva (Simulado) -->
  <div class="modal fade" id="slotModal" tabindex="-1" aria-labelledby="slotModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:12px; border:none; box-shadow: 0 10px 30px rgba(0,0,0,0.15)">
        <div class="modal-header bg-dark text-white" style="border-top-left-radius: 12px; border-top-right-radius: 12px;">
          <h5 class="modal-title fw-bold" id="slotModalLabel"><i class="bi bi-calendar-event me-2"></i>Detalle de Bloque</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4" id="modal-body-content">
          <!-- Dinámico -->
        </div>
        <div class="modal-footer" style="border-top:none">
          <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal" style="border-radius:8px">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    // URL base de Google Sheet para asignaciones
    const baseSheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTILRcrPPGmSqZYqrX4QXwIUUFnPSqCLNRVyMVPJdrwuzHcrIP2txbGvWAFrZlKKQ/pub?output=csv";

    // Resguardo offline / backup local por día
    const backupAsignaciones = {
      "415403082": [ // Martes
        { hora: "09:00 - 11:00", cancha: 1, text: "Alexis Farias\nFrancisco Farias", type: "arriendo" },
        { hora: "09:00 - 11:00", cancha: 2, text: "Javier Zuñiga\nFelipe Tamayo (CAMP)", type: "desafio" },
        { hora: "11:15 - 13:15", cancha: 3, text: "Alejandro Zenteno\nJose Luis Martinez", type: "arriendo" },
        { hora: "16:00 - 18:00", cancha: 5, text: "Juan Antican (Clase)", type: "clase" }
      ],
      "1570689087": [ // Miércoles
        { hora: "09:00 - 11:00", cancha: 3, text: "Mauricio Aguirre\nFranco Vargas", type: "arriendo" },
        { hora: "11:15 - 13:15", cancha: 1, text: "Manuel Ponce\nVictor Alvial", type: "arriendo" },
        { hora: "18:30 - 20:30", cancha: 4, text: "Liga de Tenis\nTorneo Ferroviario", type: "desafio" }
      ],
      "865920848": [ // Jueves
        { hora: "09:00 - 11:00", cancha: 5, text: "Alejandro Zenteno\nJose Luis Martinez", type: "arriendo" },
        { hora: "16:00 - 18:00", cancha: 1, text: "Williams Bustos\nVisita", type: "arriendo" },
        { hora: "18:30 - 20:30", cancha: 2, text: "Clases de Menores", type: "clase" }
      ],
      "814243974": [ // Viernes
        { hora: "09:00 - 11:00", cancha: 2, text: "Javier Zuñiga\nJaime Vasquez", type: "arriendo" },
        { hora: "11:15 - 13:15", cancha: 4, text: "Roberto Cordero\nRicardo Valdes", type: "arriendo" },
        { hora: "21:00 - 23:00", cancha: 1, text: "Williams Bustos\nVisita", type: "arriendo" }
      ],
      "162767966": [ // Sábado
        { hora: "09:00 - 11:00", cancha: 1, text: "Torneo Abierto\nSingles A", type: "desafio" },
        { hora: "09:00 - 11:00", cancha: 2, text: "Torneo Abierto\nSingles B", type: "desafio" },
        { hora: "11:15 - 13:15", cancha: 3, text: "Clase Particular", type: "clase" },
        { hora: "16:00 - 18:00", cancha: 5, text: "Arriendo Familiar", type: "arriendo" }
      ],
      "249849703": [ // Domingo
        { hora: "09:00 - 11:00", cancha: 1, text: "Final Torneo Club\nEstación Central", type: "desafio" },
        { hora: "11:15 - 13:15", cancha: 2, text: "Arriendo Recreativo", type: "arriendo" },
        { hora: "16:00 - 18:00", cancha: 4, text: "Escuela de Tenis", type: "clase" }
      ]
    };

    const backupNotas = {
      "415403082": "Nota:\n1. La cancha la asigna la Administración con los jugadores presentes por orden de llegada.\n2. La asignación en planilla es referencial.\n3. Los torneos oficiales del Club tienen prioridad.\n4. Abrir tres canchas iluminadas en el turno de las 18:30.\n5. Las solicitudes de canchas se asignan equitativamente, no por orden de pedido.",
      "1570689087": "Nota:\n1. La cancha la asigna la Administración con los jugadores presentes por orden de llegada.\n2. La asignación en planilla es referencial.\n3. Los torneos oficiales del Club tienen prioridad.",
      "865920848": "Nota:\n1. La cancha la asigna la Administración con los jugadores presentes por orden de llegada.\n2. La asignación en planilla es referencial.\n3. Los torneos oficiales del Club tienen prioridad.",
      "814243974": "Nota:\n1. La cancha la asigna la Administración con los jugadores presentes por orden de llegada.\n2. La asignación en planilla es referencial.\n3. Los torneos oficiales del Club tienen prioridad.",
      "162767966": "Nota:\n1. Reservas oficiales para el día Sábado.\n2. Por favor respetar los horarios de arriendos y clases asignados.\n3. Se solicita rastrillar la cancha al finalizar el juego.",
      "249849703": "Nota:\n1. Reservas oficiales para el día Domingo.\n2. Por favor respetar los horarios de arriendos y clases asignados.\n3. Se solicita rastrillar la cancha al finalizar el juego."
    };

    let diaSeleccionado = "Martes";
    let gidSeleccionado = "415403082";

    const timetableBody = document.getElementById("timetable-body");
    const occupancyRate = document.getElementById("occupancy-rate");
    const loadingSpinner = document.getElementById("loading-spinner");
    const slotModal = new bootstrap.Modal(document.getElementById('slotModal'));
    const modalContent = document.getElementById('modal-body-content');

    // Parser CSV que soporta comillas y saltos de línea dentro de las celdas
    function parseCSV(text) {
      let lines = [];
      let row = [""];
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        let c = text[i];
        let next = text[i+1];
        if (c === '"') {
          if (inQuotes && next === '"') {
            row[row.length - 1] += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === ',' && !inQuotes) {
          row.push('');
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
          if (c === '\r' && next === '\n') { i++; }
          lines.push(row);
          row = [''];
        } else {
          row[row.length - 1] += c;
        }
      }
      if (row.length > 1 || row[0] !== '') {
        lines.push(row);
      }
      return lines;
    }

    // Cargar planilla desde Google Sheets
    async function loadTimetable() {
      loadingSpinner.classList.remove("d-none");
      loadingSpinner.style.opacity = 1;
      
      const fetchUrl = `${baseSheetUrl}&gid=${gidSeleccionado}`;
      
      try {
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error("Fallo al descargar la hoja");
        const csvText = await response.text();
        const parsed = parseCSV(csvText);

        renderLiveGrid(parsed);
      } catch (err) {
        console.warn("Fallo cargando grilla en tiempo real, usando respaldo local:", err);
        renderBackupGrid();
      } finally {
        loadingSpinner.style.opacity = 0;
        setTimeout(() => loadingSpinner.classList.add("d-none"), 300);
      }
    }

    // Renderizar grilla real basada en el CSV de Google Sheets
    function renderLiveGrid(parsed) {
      timetableBody.innerHTML = "";
      
      // Buscar la fila de cabecera que contiene "Turno"
      let headerIndex = -1;
      for (let i = 0; i < parsed.length; i++) {
        const row = parsed[i];
        if (row && row.length > 1 && row.some(cell => cell.toLowerCase().includes("turno"))) {
          headerIndex = i;
          break;
        }
      }

      if (headerIndex === -1) {
        // Fallback si no encuentra cabecera
        renderBackupGrid();
        return;
      }

      let ocupados = 0;
      let totalSlots = 0;

      // Leer las filas siguientes
      for (let i = headerIndex + 1; i < parsed.length; i++) {
        const row = parsed[i];
        // Validar que la fila contenga un horario en la columna B (index 1)
        if (!row || row.length < 3 || !row[1]) continue;
        
        const blockText = row[1].trim();
        // Verificar si tiene formato de horario exacto (ej: "09:00 - 11:00")
        if (!blockText.match(/^\d{2}:\d{2}\s*-\s*\d{2}:\d{2}$/)) continue;

        totalSlots += 6;
        let rowHTML = `<tr><td class="time-col">${blockText}</td>`;

        // Columnas C a H correspondientes a Cancha 1 a Cancha 6
        for (let col = 2; col <= 7; col++) {
          const rawCell = row[col] ? row[col].trim() : "";
          const cellLower = rawCell.toLowerCase();

          let cellHTML = "";

          if (cellLower === "" || cellLower === "libre" || cellLower === "disponible") {
            cellHTML = `
              <td>
                <div class="slot slot-disponible" onclick="solicitarBloque('${blockText}', '${col - 1}')">
                  <span class="fw-bold"><i class="bi bi-plus-circle me-1"></i>Disponible</span>
                </div>
              </td>
            `;
          } else if (cellLower.includes("no disponible") || cellLower.includes("bloqueado")) {
            cellHTML = `
              <td>
                <div class="slot slot-nodisponible">
                  <span class="fw-bold"><i class="bi bi-slash-circle me-1"></i>Bloqueado</span>
                </div>
              </td>
            `;
          } else {
            ocupados++;
            
            // Clasificar tipo
            let typeText = "Arriendo";
            let slotClass = "slot-reservado";
            
            if (cellLower.includes("clase") || cellLower.includes("particular") || cellLower.includes("escuela") || cellLower.includes("taller")) {
              typeText = "Clase Tenis";
              slotClass = "slot-clase";
            } else if (cellLower.includes("desafio") || cellLower.includes("escalerilla") || cellLower.includes("camp") || cellLower.includes("torneo") || cellLower.includes("liga")) {
              typeText = "Torneo / Desafío";
              slotClass = "slot-desafio";
            }

            // Cambiar saltos de línea por <br> para formatear los nombres de los jugadores
            const formattedText = rawCell.replace(/\r?\n/g, "<br>");

             cellHTML = `
              <td>
                <div class="slot ${slotClass}" onclick="verReserva('${formattedText}', '${blockText}', '${col - 1}', '${typeText}')">
                  <span class="slot-name">${formattedText}</span>
                </div>
              </td>
            `;
          }
          rowHTML += cellHTML;
        }

        rowHTML += "</tr>";
        timetableBody.insertAdjacentHTML("beforeend", rowHTML);
      }

      // Calcular porcentaje de ocupación
      const rate = totalSlots > 0 ? Math.round((ocupados / totalSlots) * 100) : 0;
      occupancyRate.textContent = `${rate}%`;

      // Buscar nota en el archivo CSV
      let notaText = "";
      for (let i = 0; i < parsed.length; i++) {
        const row = parsed[i];
        if (row && row.length > 1) {
          const cell0 = row[0] ? row[0].trim() : "";
          const cell1 = row[1] ? row[1].trim() : "";
          if (cell0.toLowerCase().startsWith("nota") || cell1.toLowerCase().startsWith("nota")) {
            notaText = cell0.toLowerCase().startsWith("nota") ? cell0 : cell1;
            break;
          }
        }
      }
      displayNotes(notaText || backupNotas[gidSeleccionado]);
    }

    // Renderizar grilla de respaldo si el fetch de Sheets falla
    function renderBackupGrid() {
      timetableBody.innerHTML = "";
      const defaultSlots = [
        "09:00 - 11:00",
        "11:15 - 13:15",
        "13:30 - 15:30",
        "16:00 - 18:00",
        "18:30 - 20:30",
        "21:00 - 23:00"
      ];

      const delDia = backupAsignaciones[gidSeleccionado] || [];
      let ocupados = 0;
      const totalSlots = defaultSlots.length * 6;

      defaultSlots.forEach(hora => {
        let rowHTML = `<tr><td class="time-col">${hora}</td>`;

        for (let cancha = 1; cancha <= 6; cancha++) {
          const res = delDia.find(r => r.hora === hora && r.cancha === cancha);
          let cellHTML = "";

          if (res) {
            ocupados++;
            let typeText = "Arriendo Recreativo";
            let slotClass = "slot-reservado";
            if (res.type === "clase") {
              typeText = "Clase Tenis";
              slotClass = "slot-clase";
            } else if (res.type === "desafio") {
              typeText = "Desafío Escalerilla";
              slotClass = "slot-desafio";
            }

             cellHTML = `
              <td>
                <div class="slot ${slotClass}" onclick="verReserva('${res.text.replace(/\n/g, '<br>')}', '${hora}', '${cancha}', '${typeText}')">
                  <span class="slot-name">${res.text.replace(/\n/g, '<br>')}</span>
                </div>
              </td>
            `;
          } else {
            cellHTML = `
              <td>
                <div class="slot slot-disponible" onclick="solicitarBloque('${hora}', '${cancha}')">
                  <span class="fw-bold"><i class="bi bi-plus-circle me-1"></i>Disponible</span>
                </div>
              </td>
            `;
          }
          rowHTML += cellHTML;
        }

        rowHTML += "</tr>";
        timetableBody.insertAdjacentHTML("beforeend", rowHTML);
      });

      const rate = Math.round((ocupados / totalSlots) * 100);
      occupancyRate.textContent = `${rate}%`;

      // Mostrar nota de respaldo
      displayNotes(backupNotas[gidSeleccionado] || backupNotas["415403082"]);
    }

    // Renderizar notas y comentarios generales
    function displayNotes(notaText) {
      const notesContent = document.getElementById("general-notes-content");
      const notesCard = document.getElementById("notes-card");
      
      if (!notaText) {
        notesCard.classList.add("d-none");
        return;
      }
      
      // Separar por saltos de línea
      const lines = notaText.split(/\r?\n/);
      let listHTML = '<ul class="list-unstyled mb-0">';
      
      lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        
        // Omitir la cabecera "Nota:" para el listado, pero si tiene texto después, mostrarlo
        if (trimmed.toLowerCase() === "nota:") return;
        
        listHTML += `
          <li class="mb-2 d-flex align-items-start">
            <i class="bi bi-chevron-right text-warning me-2 mt-1 small" style="font-size: 0.75rem;"></i>
            <span>${trimmed}</span>
          </li>
        `;
      });
      listHTML += '</ul>';
      
      notesContent.innerHTML = listHTML;
      notesCard.classList.remove("d-none");
    }

    // Modal para ver reserva
    window.verReserva = function(nombreHTML, hora, cancha, tipo) {
      modalContent.innerHTML = `
        <div class="text-center mb-3">
          <i class="bi bi-check-circle-fill text-success display-6"></i>
        </div>
        <p><strong>Cancha:</strong> Cancha ${cancha} (Arcilla)</p>
        <p><strong>Horario:</strong> ${hora}</p>
        <p><strong>Socio(s) Asignado(s):</strong><br><span class="fw-bold fs-6">${nombreHTML}</span></p>
        <p><strong>Tipo de Actividad:</strong> <span class="badge bg-dark">${tipo}</span></p>
        <p class="text-muted small mt-3">Esta reserva se encuentra confirmada y visada por la directiva del Club Ferroviario.</p>
      `;
      slotModal.show();
    }

    // Modal para solicitar libre (simulado)
    window.solicitarBloque = function(hora, cancha) {
      modalContent.innerHTML = `
        <div class="text-center mb-3">
          <i class="bi bi-info-circle-fill text-warning display-6"></i>
        </div>
        <p><strong>Cancha Disponible:</strong> Cancha ${cancha} (Arcilla)</p>
        <p><strong>Bloque Disponible:</strong> ${hora}</p>
        <hr>
        <p class="text-muted small">Para solicitar esta cancha en este bloque, debes completar el formulario de solicitud en la pestaña correspondiente.</p>
        <button class="btn btn-warning w-100 fw-bold mt-2" onclick="irAlFormulario()" style="border-radius:8px; color:#151515">
          <i class="bi bi-file-earmark-plus me-1"></i>Ir al Formulario de Solicitud
        </button>
      `;
      slotModal.show();
    }

    // Función simulada para saltar a la pestaña formulario
    window.irAlFormulario = function() {
      slotModal.hide();
      // Informar al parent window que cambie de tab
      if (window.parent && window.parent.switchTab) {
        window.parent.switchTab(0);
      }
    }

    // Control de Botones de Día
    const buttons = document.querySelectorAll(".day-btn");
    buttons.forEach(button => {
      button.addEventListener("click", function() {
        buttons.forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        diaSeleccionado = this.getAttribute("data-day");
        gidSeleccionado = this.getAttribute("data-gid");
        loadTimetable();
      });
    });

    // Carga inicial
    loadTimetable();
  </script>
</body>
</html>
