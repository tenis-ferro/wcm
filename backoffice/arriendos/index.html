<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Arriendos Tenis 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container py-4">
    <header class="pb-3 mb-4 border-bottom">
        <span class="fs-4">🎾 Sistema de Arriendos 2026</span>
    </header>

    <div class="accordion" id="accordionDashboard">
        
        <div class="accordion-item shadow-sm mb-3">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseResumen">
                    <strong>1. Resumen Financiero Anual</strong>
                </button>
            </h2>
            <div id="collapseResumen" class="accordion-collapse collapse">
                <div class="accordion-body">
                    <div id="loading-resumen" class="text-center p-3">Cargando datos...</div>
                    <div class="table-responsive">
                        <table class="table table-bordered align-middle" id="tabla-resumen" style="display:none;">
                            <thead class="table-dark"><tr></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion-item shadow-sm">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDetalle">
                    <strong>2. Detalle de Arriendos</strong>
                </button>
            </h2>
            <div id="collapseDetalle" class="accordion-collapse collapse show">
                <div class="accordion-body">
                    <div class="row mb-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label font-weight-bold">Seleccionar Mes:</label>
                            <select id="selector-mes" class="form-select" onchange="cargarDetalle()">
                                <option value="Enero 2026">Enero</option>
                                <option value="Febrero 2026">Febrero</option>
                                <option value="Marzo 2026">Marzo</option>
                                <option value="Abril 2026">Abril</option>
                                <option value="Mayo 2026">Mayo</option>
                                <option value="Junio 2026">Junio</option>
                                <option value="Julio 2026">Julio</option>
                                <option value="Agosto 2026">Agosto</option>
                                <option value="Septiembre 2026">Septiembre</option>
                                <option value="Octubre 2026">Octubre</option>
                                <option value="Noviembre 2026">Noviembre</option>
                                <option value="Diciembre 2026">Diciembre</option>
                            </select>
                        </div>
                        <div class="col-md-8 text-end">
                            <input type="text" id="buscador-nombre" class="form-control d-inline-block search-box" placeholder="Filtrar por nombre..." onkeyup="filtrarPorNombre()">
                        </div>
                    </div>

                    <div id="loading-detalle" class="text-center p-3" style="display:none;">Cargando mes...</div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle" id="tabla-detalle" style="display:none;">
                            <thead class="table-dark"><tr></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div id="error-detalle" class="alert alert-warning mt-3" style="display:none;"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzuM_3bTxO-ABse9ey8Pha4a_emgyZrBJZy1E8GAXTu0uQ1sJrDyipIV_bIuc7wEavi/exec';
    let cacheDetalle = [];

    async function cargarResumen() {
        document.getElementById('loading-resumen').style.display = 'block';
        try {
            const res = await fetch(`${API_URL}?vista=resumen`, { redirect: 'follow' });
            const datos = await res.json();
            renderizarTabla('tabla-resumen', datos, true);
        } catch (e) {
            document.getElementById('loading-resumen').innerText = "Error de conexión.";
        } finally {
            document.getElementById('loading-resumen').style.display = 'none';
        }
    }

    async function cargarDetalle() {
        const mes = document.getElementById('selector-mes').value;
        const loading = document.getElementById('loading-detalle');
        const tabla = document.getElementById('tabla-detalle');
        
        loading.style.display = 'block';
        tabla.style.display = 'none';

        try {
            const res = await fetch(`${API_URL}?vista=detalle&hoja=${encodeURIComponent(mes)}`, { redirect: 'follow' });
            const datosOriginales = await res.json();
            
            if (datosOriginales.error) {
                document.getElementById('error-detalle').style.display = 'block';
            } else {
                // ORDENAMIENTO: Invertimos el array para que lo más nuevo (abajo en Excel) 
                // aparezca primero (arriba en la Web).
                cacheDetalle = datosOriginales.reverse(); 
                
                renderizarTabla('tabla-detalle', cacheDetalle, false);
            }
        } catch (e) {
            console.error("Error al cargar detalle:", e);
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderizarTabla(idTabla, datos, esResumen) {
        const tabla = document.getElementById(idTabla);
        const thead = tabla.querySelector('thead tr');
        const tbody = tabla.querySelector('tbody');

        if (!datos || datos.length === 0) return;

        let columnas;
        if (esResumen) {
            columnas = Object.keys(datos[0]).filter(k => !k.includes("Columna") && !k.includes("Dato"));
        } else {
            // Mantenemos el orden estándar: Fecha, Horario, Nombre, Tipo, Ingreso, Ticket
            columnas = ["Fecha", "Horario", "Nombre", "Tipo", "Ingreso", "Ticket"];
        }

        thead.innerHTML = columnas.map(c => `<th>${c}</th>`).join('');
        
        tbody.innerHTML = datos.map(fila => {
            return `<tr>
                ${columnas.map((col, index) => {
                    let valor = fila[col] || '';
                    let clase = (esResumen && index === 0) ? 'class="fw-bold-concept"' : '';

                    // --- LÓGICA DE FORMATEO PARA DETALLE ---
                    if (!esResumen) {
                        // 1. Formato Fecha: 2026-04-23 -> 23-04-26
                        if (col === "Fecha" && valor.includes("-")) {
                            const partes = valor.split("-"); // yyyy-mm-dd
                            if(partes.length === 3) {
                                valor = `${partes[2]}-${partes[1]}-${partes[0].slice(-2)}`;
                            }
                        }

                        // 2. Formato Nombre: Juan Luis Orellana -> J. Orellana
                        if (col === "Nombre" && valor.trim().includes(" ")) {
                            const partesNombre = valor.trim().split(/\s+/);
                            const inicial = partesNombre[0].charAt(0).toUpperCase();
                            const apellido = partesNombre[partesNombre.length - 1];
                            valor = `${inicial}. ${apellido}`;
                        }
                    }

                    return `<td ${clase}>${valor}</td>`;
                }).join('')}
            </tr>`;
        }).join('');
        
        tabla.style.display = 'table';
    }

    function filtrarPorNombre() {
        const busqueda = document.getElementById('buscador-nombre').value.toLowerCase();
        const filtrados = cacheDetalle.filter(fila => 
            fila.Nombre && fila.Nombre.toLowerCase().includes(busqueda)
        );
        renderizarTabla('tabla-detalle', filtrados, false);
    }

    // LÓGICA DE INICIO AUTOMÁTICO
    window.onload = () => {
        // 1. Cargar el resumen en segundo plano
        cargarResumen();

        // 2. Detectar mes actual y configurar selector
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const mesActualNombre = meses[new Date().getMonth()]; 
        const valorBuscado = `${mesActualNombre} 2026`;

        const selector = document.getElementById('selector-mes');
        
        // Intentar seleccionar el mes actual en el dropdown
        for (let i = 0; i < selector.options.length; i++) {
            if (selector.options[i].value === valorBuscado) {
                selector.selectedIndex = i;
                break;
            }
        }

        // 3. Cargar el detalle (Abril en este caso)
        cargarDetalle();
    };
</script>

</body>
</html>
