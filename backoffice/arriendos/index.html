<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Solicitudes - Profesores con Detalle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #1a5c37; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar { background-color: var(--primary-color); }
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .badge-estado { padding: 0.5em 0.8em; border-radius: 10px; font-size: 0.85em; font-weight: 600; }
        .estado-pendiente { background-color: #fff3cd; color: #856404; }
        .estado-completado { background-color: #d4edda; color: #155724; }
        tr { cursor: pointer; transition: background 0.2s; }
        tr:hover { background-color: #f8f9fa !important; }
        .modal-header { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🎾 Gestión de Solicitudes - Profesores</span>
    </div>
</nav>

<div class="container">
    <div class="table-container">
        <div class="row mb-4 align-items-center">
            <div class="col-md-6"><h2 class="h4 mb-0">Listado de Solicitudes</h2></div>
            <div class="col-md-6"><input type="text" id="buscador" class="form-control" placeholder="Buscar..." onkeyup="filtrarTabla()"></div>
        </div>

        <div id="loading" class="text-center my-5"><div class="spinner-border text-success"></div></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle" id="tabla-solicitudes" style="display:none;">
                <thead class="table-light">
                    <tr>
                        <th>FECHA</th>
                        <th>BLOQUE</th>
                        <th>PROFESOR</th>
                        <th>ALUMNO</th>
                        <th>ESTADO</th>
                        <th>TICKET</th>
                    </tr>
                </thead>
                <tbody id="tbody-solicitudes"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="detalleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detalle Completo de la Solicitud</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modal-body-content">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzGUneIMiVzI22GzGi-An8XusnKjzLs6QE6xnltxU_Nax2GAhhdMjhvw0B8lgo02iL5/exec';
    let datosCache = [];

    async function obtenerDatos() {
        try {
            const response = await fetch(API_URL, { redirect: 'follow' });
            const result = await response.json();
            if (result.status === "success") {
                datosCache = result.data.reverse();
                renderizarTabla(datosCache);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tabla-solicitudes').style.display = 'table';
            }
        } catch (e) { console.error("Error:", e); }
    }

    function renderizarTabla(lista) {
        const tbody = document.getElementById('tbody-solicitudes');
        tbody.innerHTML = '';

        lista.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            // Pasamos el objeto stringificado para que el modal lo reciba
            tr.setAttribute('onclick', `mostrarDetalle(${JSON.stringify(item).replace(/'/g, "&apos;")})`);

            const fecha = item["fecha"] ? new Date(item["fecha"]).toLocaleDateString('es-CL') : '---';
            const estado = item["estado"] || 'Pendiente';
            const claseEstado = (estado.toLowerCase() === 'pagado' || estado.toLowerCase() === 'ok') ? 'estado-completado' : 'estado-pendiente';

            tr.innerHTML = `
                <td>${fecha}</td>
                <td><small>${item["bloque horario"] || '---'}</small></td>
                <td class="fw-bold">${item["profesor"] || '---'}</td>
                <td>${item["alumno"] || '---'}</td>
                <td><span class="badge-estado ${claseEstado}">${estado}</span></td>
                <td class="fw-bold text-primary">${item["ticket"] || 'S/N'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function mostrarDetalle(fila) {
        const modalBody = document.getElementById('modal-body-content');
        let html = '<ul class="list-group list-group-flush">';

        // Iteramos por todas las propiedades del JSON de forma dinámica
        for (const [key, value] of Object.entries(fila)) {
            if (key.trim() !== "") {
                const label = key.charAt(0).toUpperCase() + key.slice(1);
                let valorFinal = value || '---';

                // Formateo especial para fechas si la llave contiene 'fecha' o 'temporal'
                if ((key.includes('fecha') || key.includes('temporal')) && value) {
                    valorFinal = new Date(value).toLocaleString('es-CL');
                }

                html += `
                    <li class="list-group-item d-flex justify-content-between align-items-start">
                        <div class="ms-2 me-auto">
                            <div class="fw-bold text-muted small">${label}</div>
                            ${valorFinal}
                        </div>
                    </li>`;
            }
        }
        html += '</ul>';
        modalBody.innerHTML = html;

        const miModal = new bootstrap.Modal(document.getElementById('detalleModal'));
        miModal.show();
    }

    function filtrarTabla() {
        const termino = document.getElementById('buscador').value.toLowerCase();
        const filtrados = datosCache.filter(item => 
            `${item.profesor} ${item.alumno} ${item.ticket}`.toLowerCase().includes(termino)
        );
        renderizarTabla(filtrados);
    }

    window.onload = obtenerDatos;
</script>
</body>
</html>
