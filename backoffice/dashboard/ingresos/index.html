<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Ops Dashboard - Q1 2026</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); }
        .sidebar { background: #2c3e50; min-height: 100vh; color: white; padding: 20px; }
        .stat-card { color: white; }
        .bg-gradient-blue { background: linear-gradient(45deg, #3498db, #2980b9); }
        .bg-gradient-green { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .hidden-widget { display: none; }
        .filter-section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar / Configuración -->
        <div class="col-md-2 sidebar">
            <h4>Panel de Control</h4>
            <hr>
            <p class="small text-uppercase fw-bold">Visibilidad</p>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="toggleRevenue" checked onchange="toggleWidget('cardRevenue')">
                <label class="form-check-label">Ingresos Totales</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="toggleGrowth" checked onchange="toggleWidget('cardGrowth')">
                <label class="form-check-label">Crecimiento %</label>
            </div>
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="toggleChart" checked onchange="toggleWidget('cardMainChart')">
                <label class="form-check-label">Gráfico Principal</label>
            </div>
            <hr>
            <p class="small text-uppercase fw-bold">Filtro Rápido</p>
            <select class="form-select mb-3" id="monthFilter" onchange="updateData()">
                <option value="all">Todo el Trimestre</option>
                <option value="0">Enero</option>
                <option value="1">Febrero</option>
                <option value="2">Marzo</option>
            </select>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <h2 class="mb-4">Dashboard de Ventas <span class="text-muted fw-light">| Q1 2026</span></h2>

            <!-- KPI Cards -->
            <div class="row">
                <div class="col-md-6" id="cardRevenue">
                    <div class="card stat-card bg-gradient-blue p-4 text-center">
                        <h5>Ingresos Netos</h5>
                        <h1 id="txtRevenue">$0.00</h1>
                    </div>
                </div>
                <div class="col-md-6" id="cardGrowth">
                    <div class="card stat-card bg-gradient-green p-4 text-center">
                        <h5>Crecimiento vs Mes Anterior</h5>
                        <h1 id="txtGrowth">0%</h1>
                    </div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="row" id="cardMainChart">
                <div class="col-12">
                    <div class="card p-4">
                        <div class="d-flex justify-content-between">
                            <h5>Rendimiento Mensual vs Meta</h5>
                            <span class="badge bg-primary pt-2">Actualizado: Mayo 2026</span>
                        </div>
                        <canvas id="salesChart" height="100"></canvas>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="row">
                <div class="col-12">
                    <div class="card p-4">
                        <h5>Detalle de Transacciones</h5>
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Mes</th>
                                    <th>Ventas</th>
                                    <th>Meta</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable">
                                <!-- Datos inyectados por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Datos del negocio (Inventados)
    const rawData = [
        { month: 'Enero', sales: 45000, target: 40000, growth: 12 },
        { month: 'Febrero', sales: 52000, target: 50000, growth: 15 },
        { month: 'Marzo', sales: 48000, target: 55000, growth: -7 }
    ];

    let myChart;

    // 2. Inicialización
    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        updateData();
    });

    function initChart() {
        const ctx = document.getElementById('salesChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: rawData.map(d => d.month),
                datasets: [{
                    label: 'Ventas Reales ($)',
                    data: rawData.map(d => d.sales),
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: '#2980b9',
                    borderWidth: 1
                },
                {
                    label: 'Meta ($)',
                    data: rawData.map(d => d.target),
                    type: 'line',
                    borderColor: '#e74c3c',
                    borderWidth: 3,
                    fill: false
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
    }

    // 3. Lógica de Interactividad
    function updateData() {
        const filter = document.getElementById('monthFilter').value;
        let displayData = filter === 'all' ? rawData : [rawData[parseInt(filter)]];
        
        // Actualizar KPIs
        const totalSales = displayData.reduce((acc, curr) => acc + curr.sales, 0);
        const avgGrowth = (displayData.reduce((acc, curr) => acc + curr.growth, 0) / displayData.length).toFixed(1);
        
        document.getElementById('txtRevenue').innerText = `$${totalSales.toLocaleString()}`;
        document.getElementById('txtGrowth').innerText = `${avgGrowth}%`;

        // Actualizar Tabla
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = displayData.map(d => `
            <tr>
                <td>${d.month}</td>
                <td>$${d.sales.toLocaleString()}</td>
                <td>$${d.target.toLocaleString()}</td>
                <td><span class="badge ${d.sales >= d.target ? 'bg-success' : 'bg-danger'}">${d.sales >= d.target ? 'Meta Cumplida' : 'Bajo Meta'}</span></td>
            </tr>
        `).join('');

        // Actualizar Gráfico si es necesario (Highlight)
        if (filter !== 'all') {
            myChart.data.datasets[0].backgroundColor = rawData.map((_, i) => i == filter ? '#f1c40f' : 'rgba(52, 152, 219, 0.3)');
        } else {
            myChart.data.datasets[0].backgroundColor = 'rgba(52, 152, 219, 0.7)';
        }
        myChart.update();
    }

    // Alternar visibilidad de widgets
    function toggleWidget(id) {
        const element = document.getElementById(id);
        element.classList.toggle('hidden-widget');
    }
</script>

</body>
</html>
