<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Profesores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--primary-color); shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card-solicitud { transition: transform 0.2s; border: none; border-left: 5px solid #3498db; }
        .card-solicitud:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #loader { display: flex; justify-content: center; align-items: center; height: 200px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Gestión de Solicitudes - Docentes</span>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col">
            <button class="btn btn-primary" onclick="cargarSolicitudes()">Actualizar Datos</button>
        </div>
    </div>

    <div id="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <div id="contenedor-solicitudes" class="row g-4">
        </div>
</div>

<script src="app.js"></script>
</body>
</html>
