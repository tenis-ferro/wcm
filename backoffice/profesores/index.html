<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Club de Tenis - Iniciar Sesión</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Pantalla de carga (Overlay) -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">Cargando...</p>
</div>

<div class="container">
    <!-- ==================== AUTHENTICATION PANEL ==================== -->
    <div id="authSection" class="login-container" style="display: none;">
        <div class="login-card">
            <h2 id="authTitle"><i class="fas fa-lock"></i> Iniciar Sesión</h2>
            <p class="subtitle" id="authSubtitle">Acceso al sistema de reservas de profesores</p>
            
            <form id="authForm">
                <!-- Sign Up exclusive inputs (hidden on Sign In) -->
                <div class="form-group signup-only" style="display: none;">
                    <label for="regName"><i class="fas fa-user"></i> Nombre</label>
                    <input type="text" id="regName" placeholder="Ej: Javier">
                </div>
                <div class="form-group signup-only" style="display: none;">
                    <label for="regLastName"><i class="fas fa-user"></i> Apellido</label>
                    <input type="text" id="regLastName" placeholder="Ej: Zúñiga">
                </div>
                <div class="form-group signup-only" style="display: none;">
                    <label for="regPhone"><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="text" id="regPhone" placeholder="Ej: +56912345678">
                </div>
                <div class="form-group signup-only" style="display: none;">
                    <label for="regRole"><i class="fas fa-user-tag"></i> Rol</label>
                    <select id="regRole">
                        <option value="profesor">Profesor de Tenis</option>
                        <option value="admin">Administrador del Club</option>
                    </select>
                </div>
                
                <!-- Shared inputs -->
                <div class="form-group">
                    <label for="authEmail"><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" id="authEmail" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="authPassword"><i class="fas fa-key"></i> Contraseña</label>
                    <input type="password" id="authPassword" required placeholder="Min. 6 caracteres">
                </div>
                
                <button type="submit" class="btn-primary" id="btnAuthSubmit" style="margin-top: 10px;">Entrar</button>
            </form>
        </div>
    </div>
</div>

<!-- Container for Bootstrap Toasts (Notifications) -->
<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 2000;">
    <div id="appToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true" style="border-radius: 16px; min-width: 320px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);">
        <div class="d-flex">
            <div class="toast-body d-flex align-items-center gap-2" style="font-weight: 600; padding: 12px 16px;">
                <span id="toastIcon"></span>
                <span id="toastMessage"></span>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Login Javascript App Logic -->
<script src="login.js"></script>
</body>
</html>
