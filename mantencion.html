<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>En Construcción | Club de Tenis Ferroviario</title>

  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">

  <style>
    /* Forzamos que el cuerpo tenga un fondo visible y no haya desbordes */
    body {
      background-color: #ffffff !important;
    }

    #main {
      padding-top: 120px; /* Espacio extra para que el Header no tape nada */
      min-height: 80vh;
    }

    .construction-box {
      text-align: center;
      padding: 60px 20px;
      background: #f8f9fa; /* Fondo gris muy claro para contrastar */
      border-radius: 20px;
      border: 1px solid #dee2e6;
    }
  </style>
</head>

<body>

  <header id="header" class="fixed-top header-inner-pages" style="background: rgba(0,0,0,0.8);">
    <div class="container d-flex align-items-center justify-content-lg-between">
      <h1 class="logo me-auto me-lg-0"><a href="index.html"><img src="assets/img/Logo-Ferro-3.png" alt="Logo"></a></h1>
      <nav id="navbar" class="navbar order-last order-lg-0">
        <ul>
          <li><a class="nav-link" href="index.html">Inicio</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container" data-aos="fade-up">
      <div class="row justify-content-center">
        <div class="col-lg-10 construction-box">
          
          <div style="font-size: 60px; color: #ffc107; margin-bottom: 20px;">
            <i class="bi bi-cone-striped"></i>
          </div>

          <h1 style="color: #1a1a1a !important; font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; display: block !important;">
            Página en Construcción
          </h1>

          <p style="color: #444444 !important; font-size: 1.5rem; margin-bottom: 40px; display: block !important; visibility: visible !important;">
            Estamos preparando contenido de esta página.
          </p>

          <div class="progress" style="height: 30px; margin-bottom: 40px; border-radius: 15px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" 
                 role="progressbar" style="width: 75%; color: #000; font-weight: bold;">
                 PROXIMAMENTE
            </div>
          </div>

          <a href="index.html" class="btn btn-dark btn-lg px-5" style="border-radius: 50px;">
            Volver al Inicio
          </a>

        </div>
      </div>
    </div>
  </main>

  <footer id="footer" style="margin-top: 50px;">
    <div class="container text-center">
      <div class="copyright" style="color: #666;">
        &copy; 2024 <strong><span>Club de Tenis Ferroviario</span></strong>.
      </div>
    </div>
  </footer>

  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
