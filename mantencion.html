<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>En Construcción | Club de Tenis Ferroviario</title>

  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff !important;
      overflow-x: hidden; /* Evita scroll horizontal */
    }

    #main {
      padding-top: 100px;
      min-height: 80vh;
      display: flex;
      align-items: center;
    }

    .construction-box {
      text-align: center;
      padding: 40px 15px; /* Padding reducido para móviles */
      background: #f8f9fa;
      border-radius: 20px;
      border: 1px solid #dee2e6;
      margin-bottom: 30px;
    }

    /* --- AJUSTES RESPONSIVE --- */
    
    /* Tamaño del título principal */
    .title-responsive {
      color: #1a1a1a !important;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 20px;
      font-size: 1.8rem; /* Tamaño base para celular */
    }

    /* Tamaño del texto secundario */
    .subtitle-responsive {
      color: #444444 !important;
      font-size: 1.1rem; /* Tamaño base para celular */
      margin-bottom: 30px;
    }

    /* Media Query para Tablets y Desktop (Pantallas > 768px) */
    @media (min-width: 768px) {
      #main { padding-top: 120px; }
      .construction-box { padding: 60px 40px; }
      .title-responsive { font-size: 3.5rem; }
      .subtitle-responsive { font-size: 1.5rem; }
    }

    /* Ajuste para el logo en móviles */
    .logo img {
      max-width: 140px;
      height: auto;
    }
  </style>
</head>

<body>

  <header id="header" class="fixed-top header-inner-pages" style="background: rgba(0,0,0,0.9);">
    <div class="container d-flex align-items-center justify-content-between">
      <h1 class="logo"><a href="index.html"><img src="assets/img/Logo-Ferro-3.png" alt="Logo"></a></h1>
      <nav id="navbar" class="navbar">
        <ul>
          <li><a class="nav-link" href="index.html">Inicio</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container" data-aos="zoom-in">
      <div class="row justify-content-center">
        <div class="col-11 col-md-10 construction-box">
          
          <div style="font-size: 50px; color: #ffc107; margin-bottom: 15px;">
            <i class="bi bi-cone-striped"></i>
          </div>

          <h1 class="title-responsive">
            Página en Construcción
          </h1>

          <p class="subtitle-responsive">
            Estamos preparando contenido exclusivo para esta página.
          </p>

          <div class="progress mb-4" style="height: 25px; border-radius: 15px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" 
                 role="progressbar" style="width: 75%; color: #000; font-weight: bold; font-size: 0.8rem;">
                 PRÓXIMAMENTE
            </div>
          </div>

          <div class="d-grid gap-2 d-md-block">
            <a href="index.html" class="btn btn-dark btn-lg px-5" style="border-radius: 50px; font-size: 1rem;">
              Volver al Inicio
            </a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer id="footer">
    <div class="container text-center py-4">
      <div class="copyright" style="color: #666; font-size: 0.9rem;">
        &copy; 2024 <strong><span>Club de Tenis Ferroviario</span></strong>.
      </div>
    </div>
  </footer>

  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
  </script>

</body>
</html>
